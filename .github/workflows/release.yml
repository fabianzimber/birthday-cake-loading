name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      # Support both common secret names; also ensure NODE_AUTH_TOKEN is set
      # because actions/setup-node writes an .npmrc that references it.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Detect whether this version still needs publishing
        id: release_state
        shell: bash
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          published_version=$(npm view "$package_name" version 2>/dev/null || true)
          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"
          echo "published_version=$published_version" >> "$GITHUB_OUTPUT"
          if [ "$published_version" = "$package_version" ]; then
            echo "needs_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version $package_version is already on npm; skipping eager auth validation."
          else
            echo "needs_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version $package_version is not on npm yet; npm auth must succeed."
          fi

      - name: Check npm auth token is present
        if: steps.release_state.outputs.needs_publish == 'true'
        run: node -e "if(!process.env.NPM_TOKEN){console.error('Missing npm token. Add a repo secret named NPM_TOKEN (or NODE_AUTH_TOKEN) with an npm Automation token.'); process.exit(1)}"

      - name: Verify npm authentication
        if: steps.release_state.outputs.needs_publish == 'true'
        run: npm whoami

      - name: Create Release Pull Request or Publish
        uses: changesets/action@v1
        with:
          version: npm run version
          publish: npm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Keep explicit for Changesets, even though it's also set at job level.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NODE_AUTH_TOKEN }}

